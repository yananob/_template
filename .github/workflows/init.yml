name: Initialize Repository

on:
  workflow_dispatch:
    inputs:
      function_name:
        description: 'Function name (used for replacement)'
        required: true
      template_repo_url:
        description: 'Template repository URL for core/ submodule'
        required: true
        default: 'git@github.com:yananob/cloud-functions-common'

jobs:
  initialize:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add core submodule
        run: |
          git submodule add ${{ github.event.inputs.template_repo_url }} core
          git commit -m "Add core submodule"

      - name: Replace placeholders
        run: |
          # core/ と .git/ を除外して一括置換
          # sed のデリミタに | を使用し、入力値に含まれる / に対応
          find . -type f -not -path '*/.git/*' -not -path './core/*' -exec sed -i "s|{{VALUES_FUNCTION_NAME}}|${{ github.event.inputs.function_name }}|g" {} +
          git add .
          if ! git diff-index --quiet HEAD; then
            git commit -m "Initialize project with function name: ${{ github.event.inputs.function_name }}"
          fi

      - name: Self-destruct
        run: |
          rm .github/workflows/init.yml
          git add .github/workflows/init.yml
          git commit -m "Self-destruct initialization workflow"

      - name: Push changes
        run: git push origin ${{ github.ref_name }}
