name: Deploy Cloud Functions (production)

on:
  # push:
  #   branches:
  #     - main
  workflow_dispatch:

concurrency:
  group: XXX-deploy-prod

permissions:
  contents: 'read'
  id-token: 'write'

jobs:
  deploy:
    uses: yananob/cloud-functions-common/.github/workflows/deploy-cloud-functions.yaml@main
    with:
      function_name: XXX
      service_account_name: 'cloud-run-functions-deployer'
      wip_pool_name: 'github-actions-pool'
      wip_provider_name: 'github-provider'
      runtime: php83
      secrets_config: |-
        SECRET_KEYS
      # gcs_source_dir: ./public/
      # gcs_bucket_name: XXX-static
      # gcs_bucket_path: 
      # disable_gcs_cache: true
      deploy_http_trigger: true
      deploy_event_trigger: false
      http_max_instance_count: 1
      memory: '256M'
      http_timeout: '5m'
      event_timeout: '540s'
      environment_variables: |-
        APP_ENV=production
    secrets:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_REGION: ${{ secrets.GCP_REGION }}
      GCP_PROJECT_NUMBER: ${{ secrets.GCP_PROJECT_NUMBER }}
